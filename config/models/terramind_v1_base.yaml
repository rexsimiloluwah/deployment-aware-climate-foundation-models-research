model: terramind_v1_base
display_name: TerraMind-1.0 Base
model_family: terramind
is_foundation_model: true
hf_repo: ibm-esa-geospatial/TerraMind-1.0-base
checkpoint_file: TerraMind_v1_base.pt
parameter_count_estimate: 380000000
checkpoint_size_estimate: 1.52GB
machine_type: a2-highgpu-1g
precision: bf16
modalities:
  - sentinel_1
  - sentinel_2
  - landsat
  - dem
  - climate_or_auxiliary_modalities
task_fit:
  sen1floods11_ghana: high
  ftw_africa: medium
selection_role: second_model
selection_rationale: >-
  Comparable scale to Prithvi-EO-2.0 300M but with a different multimodal,
  generative EO design. This makes it useful for testing whether deployment
  trade-offs are model-specific rather than only dataset-specific.
integration_priority: 2
integration_status: terratorch_loader_ready_for_gcp_validation
notes: >-
  Strong second model. Hugging Face repo is reachable and exposes README.md and
  TerraMind_v1_base.pt. The harness now loads this through TerraTorch's
  BACKBONE_REGISTRY and validates it in the GCP full-pipeline notebook.
